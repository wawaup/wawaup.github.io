<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wawaup的个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-background" aria-hidden="true">
        <div class="bg-orb orb-left"></div>
        <div class="bg-orb orb-right"></div>
        <div class="bg-grid"></div>
    </div>

    <header class="hero-shell">
        <div id="id-card" class="profile-card">
            <div class="avatar-column">
                <img class="avatar-image" src="public/img/avatar0.jpg" alt="Avatar">
                <div class="profile-socials">
                    <a class="social-link social-link-github" href="https://github.com/wawaup" target="_blank" rel="noreferrer" aria-label="GitHub" title="GitHub">
                        <span class="profile-icon social-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M9 19c-4 1.2-4-2-5.5-2.5"></path>
                                <path d="M15 21v-3.4a2.9 2.9 0 0 0-.8-2.1c2.6-.3 5.3-1.3 5.3-6a4.7 4.7 0 0 0-1.3-3.3 4.4 4.4 0 0 0-.1-3.2s-1-.3-3.4 1.3a11.8 11.8 0 0 0-6.2 0C6.1 2.7 5 3 5 3a4.4 4.4 0 0 0-.1 3.2 4.7 4.7 0 0 0-1.3 3.3c0 4.7 2.7 5.7 5.3 6a2.5 2.5 0 0 0-.7 1.9V21"></path>
                            </svg>
                        </span>
                    </a>
                    <span class="social-link social-link-linkedin is-placeholder" aria-label="LinkedIn coming soon" title="LinkedIn coming soon">
                        <span class="profile-icon social-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M7 9v8"></path>
                                <path d="M7 6.8a.2.2 0 1 1 0 .4.2.2 0 0 1 0-.4Z"></path>
                                <path d="M11 17V9"></path>
                                <path d="M11 12.4a3 3 0 0 1 6 0V17"></path>
                            </svg>
                        </span>
                    </span>
                </div>
            </div>
            <div class="profile-meta">
                <div class="profile-row">
                    <span class="profile-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path>
                            <path d="M5.5 19.5c.7-3 3.5-5 6.5-5s5.8 2 6.5 5"></path>
                        </svg>
                    </span>
                    <span data-zh="高雅" data-en="Ya Gao (Gloria)">高雅</span>
                </div>
                <div class="profile-row">
                    <span class="profile-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <rect x="4" y="6.5" width="16" height="11" rx="2"></rect>
                            <path d="m5.5 8 6.5 5 6.5-5"></path>
                        </svg>
                    </span>
                    <span>wawaupgao@163.com</span>
                </div>
                <div class="profile-row">
                    <span class="profile-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M7 10h10v8H7z"></path>
                            <path d="M6 18h12"></path>
                            <path d="M9.5 10V7.5"></path>
                            <path d="M12 10V6"></path>
                            <path d="M14.5 10V7.5"></path>
                            <path d="M9.5 6.5c.6-.4.6-1.2 0-1.7-.6.5-.6 1.3 0 1.7Z"></path>
                            <path d="M12 5c.6-.4.6-1.2 0-1.7-.6.5-.6 1.3 0 1.7Z"></path>
                            <path d="M14.5 6.5c.6-.4.6-1.2 0-1.7-.6.5-.6 1.3 0 1.7Z"></path>
                        </svg>
                    </span>
                    <span>2002.01.29</span>
                </div>
                <div class="profile-row">
                    <span class="profile-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="m12 4 1.7 4 4.3 1.6-3.3 2.8 1 4.2-3.7-2.1-3.7 2.1 1-4.2L6 9.6 10.3 8Z"></path>
                        </svg>
                    </span>
                    <span data-zh="美食、小说、游戏" data-en="Food, novels, gaming">美食、小说、游戏</span>
                </div>
            </div>
        </div>

        <div class="hero-copy">
            <p class="hero-kicker" data-zh="个人名片 / 简历主页" data-en="Personal Card / Resume Site">个人名片 / 简历主页</p>
            <h1 data-zh="欢迎来到我的主页" data-en="Welcome to My Homepage">欢迎来到我的主页</h1>
            <p class="hero-intro" data-zh="我把教育背景、工作经历和项目经历整理成了一张更清晰也更好逛的在线名片，希望它既专业，也有一点点个人趣味。" data-en="I organized my education, work, and project experience into a cleaner online resume that feels professional while keeping a little personality.">我把教育背景、工作经历和项目经历整理成了一张更清晰也更好逛的在线名片，希望它既专业，也有一点点个人趣味。</p>
        </div>
    </header>

    <nav id="section-nav" class="section-nav">
        <div class="nav-brand">
            <span class="nav-brand-dot"></span>
            <span data-zh="内容导航" data-en="Section Navigation">内容导航</span>
        </div>
        <div id="nav-links" class="nav-links"></div>
        <div class="language-switch" aria-label="Language switch">
            <button type="button" class="lang-btn" data-lang="zh">中文</button>
            <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
    </nav>

    <main class="content-shell">
        <div id="main-content" class="content-panel">
            <section id="education" class="resume-section" data-nav-zh="教育背景" data-nav-en="Education">
                <div class="section-heading">
                    <div class="section-icon">
                        <img src="public/img/graduate.svg" alt="" aria-hidden="true">
                    </div>
                    <div>
                        <p class="section-kicker" data-zh="Academic" data-en="Academic">Academic</p>
                        <h2 class="title" data-zh="教育背景" data-en="Education">教育背景</h2>
                    </div>
                </div>
                <div id="education-list" class="resume-list"></div>
            </section>

            <section id="work" class="resume-section" data-nav-zh="工作经历" data-nav-en="Work Experience">
                <div class="section-heading">
                    <div class="section-icon">
                        <img src="public/img/project.svg" alt="" aria-hidden="true">
                    </div>
                    <div>
                        <p class="section-kicker" data-zh="Career" data-en="Career">Career</p>
                        <h2 class="title" data-zh="工作经历" data-en="Work Experience">工作经历</h2>
                    </div>
                </div>
                <div id="work-list" class="resume-list"></div>
            </section>

            <section id="dev-project" class="resume-section" data-nav-zh="专业项目经历" data-nav-en="Professional Projects">
                <div class="section-heading">
                    <div class="section-icon">
                        <img src="public/img/code.svg" alt="" aria-hidden="true">
                    </div>
                    <div>
                        <p class="section-kicker" data-zh="Build" data-en="Build">Build</p>
                        <h2 class="title" data-zh="专业项目经历" data-en="Professional Projects">专业项目经历</h2>
                    </div>
                </div>
                <div id="dev-list" class="resume-list"></div>
            </section>

            <section id="pm-project" class="resume-section" data-nav-zh="产品项目经历" data-nav-en="Product Projects">
                <div class="section-heading">
                    <div class="section-icon">
                        <img src="public/img/product.svg" alt="" aria-hidden="true">
                    </div>
                    <div>
                        <p class="section-kicker" data-zh="Product" data-en="Product">Product</p>
                        <h2 class="title" data-zh="产品项目经历" data-en="Product Projects">产品项目经历</h2>
                    </div>
                </div>
                <div id="pm-list" class="resume-list"></div>
            </section>
        </div>
    </main>

    <div id="image-modal" class="image-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <button id="image-modal-close" class="image-modal-close" type="button" aria-label="Close image viewer">x</button>
        <figure class="image-modal-figure">
            <img id="image-modal-img" src="" alt="">
            <figcaption id="image-modal-caption"></figcaption>
        </figure>
    </div>

    <canvas class="live2d" id="live2d" width="120" height="300"></canvas>

    <script src="./live2d.js"></script>
    <script src="./app.js"></script>
    <script>
        loadlive2d("live2d", "./xiaomai/xiaomai.model.json");
    </script>
</body>
</html>
